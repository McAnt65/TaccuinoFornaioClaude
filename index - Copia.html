<!DOCTYPE html>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        
        /* Sostituito il nero di sfondo con un caldissimo marrone cuoio scuro/espresso */
        body, html { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            font-family: 'Cormorant Garamond', serif; 
            color: #4a2711; /* Sostituito il nero dei testi con un marrone tabacco intenso */
            background-color: #231207; /* Caldo color legno scuro esterno */
        }

        /* ============================================================
           ANIMAZIONI FONDAMENTALI
           ============================================================ */

        /* Velina che si solleva: il contenuto nuovo appare dal basso */
        @keyframes paginaEntra {
            0%   { opacity: 0; transform: translateY(18px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Uscita: il contenuto vecchio sfuma verso l'alto */
        @keyframes paginaEsce {
            0%   { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-14px); }
        }

        /* Rivelazione progressiva di un elemento (titolo, ingredienti, racconto) */
        @keyframes svelaElemento {
            0%   { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }



        #app-container { 
            width: 100%; 
            height: 100%; 
            position: relative; 
            background-size: 100% 100%; 
            background-position: center; 
            margin: 0 auto; 
            max-width: 412px; 

        }

        /* Classi JS per la transizione pagina */
        #scroll-box.sta-uscendo {
            animation: paginaEsce 0.56s ease-in forwards;
            pointer-events: none;
        }
        #scroll-box.sta-entrando {
            animation: paginaEntra 1.1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        /* Rivelazione progressiva degli elementi interni della scheda ricetta */
        .svela-1 { animation: svelaElemento 1s ease-out 0.1s both; }
        .svela-2 { animation: svelaElemento 1s ease-out 0.5s both; }
        .svela-3 { animation: svelaElemento 1s ease-out 0.9s both; }
        .svela-4 { animation: svelaElemento 1s ease-out 1.3s both; }
        .svela-5 { animation: svelaElemento 1s ease-out 1.7s both; }

    <script>const databaseRicette = [];</script>
    <script src="ricette_comuni.js"></script>
    <script src="ricette_integrali.js"></script>
    <script src="ricette_europei.js"></script>
    <script src="ricette_mondo.js"></script>

    <script>
let pesoAttuale = 750;
let lievitoAttuale = 'secco';
let parametroMadre = parseFloat(localStorage.getItem('parametroMadre')) || 35;
let ricettaAttuale = null;

// ---------------------------------------------------------------
// CONTROLLO QUALITA' DEL DATABASE RICETTE (solo log in console)
// Segnala id duplicati, numeri duplicati, categorie o programmi
// non riconosciuti. Non blocca l'app, serve solo come promemoria
// per chi aggiunge nuove ricette in ricette.js.
// ---------------------------------------------------------------
function validaDatabaseRicette() {
    const categorieValide = ['comuni', 'integrali', 'europei', 'mondo', 'sfiziosi', 'dolci', 'impasti', 'colazioni'];
    const numeriProgramma = Array.from({length: 19}, (_, i) => `${i + 1}.`);

    const idVisti = new Set();
    const numeriVisti = new Set();

    databaseRicette.forEach(r => {
        if (idVisti.has(r.id)) {
            console.warn(`[Taccuino] id duplicato: "${r.id}"`);
        }
        idVisti.add(r.id);

        if (numeriVisti.has(r.numero)) {
            console.warn(`[Taccuino] numero ricetta duplicato: ${r.numero} (id: ${r.id})`);
        }
        numeriVisti.add(r.numero);

        if (!categorieValide.includes(r.categoria)) {
            console.warn(`[Taccuino] categoria non riconosciuta "${r.categoria}" nella ricetta "${r.id}"`);
        }

        if (r.programma && !numeriProgramma.some(n => r.programma.trim().startsWith(n))) {
            console.warn(`[Taccuino] programma "${r.programma}" nella ricetta "${r.id}" non inizia con un numero valido (1-19)`);
        }
    });
}
validaDatabaseRicette();

// ---------------------------------------------------------------
// PREFERITI - segnalibro sulle ricette, salvato in localStorage
// così resta memorizzato anche chiudendo l'app.
// ---------------------------------------------------------------
function getPreferiti() {
    try {
        const dati = localStorage.getItem('preferiti');
        return dati ? JSON.parse(dati) : [];
    } catch(e) {
        return [];
    }
}

function isPreferita(id) {
    return getPreferiti().includes(id);
}

function toggleStellaPreferita(id, event) {
    if (event) event.stopPropagation();
    let prefs = getPreferiti();
    if (prefs.includes(id)) {
        prefs = prefs.filter(p => p !== id);
    } else {
        prefs.push(id);
    }
    localStorage.setItem('preferiti', JSON.stringify(prefs));

    const el = document.getElementById('stella-' + id);
    if (el) el.classList.toggle('attiva');
}

    function mostraPreferiti() {
        const box   = document.getElementById('scroll-box');
        const prefs = getPreferiti();

        if (prefs.length === 0) {
            box.innerHTML = `
                <h2>Le Mie Pagnottelle</h2>
                <p class="preferiti-vuoti">
                    Nessuna ricetta nei preferiti ancora.<br>
                    Tocca la <span class="stella-esempio">★</span> su una ricetta
                    per aggiungerla qui.
                </p>`;
            return;
        }

        let html = '<h2>Le Mie Pagnottelle</h2>';

        prefs.forEach(id => {
            const r = databaseRicette.find(r => r.id === id);
            if (!r) return; // sicurezza: id obsoleto

            let linkFoto = '';
            if (r.immagine) {
                linkFoto = ` <span class="vedi-foto-btn" onclick="event.stopPropagation(); apriFotoSovrapposizione('${r.immagine}')">[ VEDI FOTO ]</span>`;
            }
            html += `<div class="cat-item preferita" onclick="mostraDettaglioRicetta('${r.id}')">
                <span class="stella-elenco attiva" onclick="event.stopPropagation(); rimuoviDaPreferiti('${r.id}', this)">★</span>
                N.&nbsp;${r.numero} — ${r.titolo}${linkFoto}
            </div>`;
        });

        box.innerHTML = html;
        box.scrollTop = 0;
    }

    // Rimuove dai preferiti direttamente dalla lista pagnottelle
    function rimuoviDaPreferiti(id, elStella) {
        let prefs = getPreferiti();
        prefs = prefs.filter(p => p !== id);
        localStorage.setItem('preferiti', JSON.stringify(prefs));

    function eseguiRicerca(query) {
        const q = query.trim().toLowerCase();
        const boxRisultati = document.getElementById('risultati-ricerca');
        if (!boxRisultati) return;

        if (q.length < 2) {
            boxRisultati.style.display = 'none';
            boxRisultati.innerHTML = '';
            return;
        }

        // Cerca in: titolo, categoria, tipoFarina, note,
        // nomi degli ingredienti (dosiBase keys), ingredientiExtra, storia
        const risultati = databaseRicette.filter(r => {
            // Titolo
            if (r.titolo && r.titolo.toLowerCase().includes(q)) return true;
            // Tipo farina
            if (r.tipoFarina && r.tipoFarina.toLowerCase().includes(q)) return true;
            // Note
            if (r.note && r.note.toLowerCase().includes(q)) return true;
            // Storia (testo narrativo)
            if (r.storia && r.storia.toLowerCase().includes(q)) return true;
            // ingredientiExtra (nomi)
            if (r.ingredientiExtra) {
                if (r.ingredientiExtra.some(e => e.nome && e.nome.toLowerCase().includes(q))) return true;
            }
            // ingredientiFissi
            if (r.ingredientiFissi) {
                if (r.ingredientiFissi.some(e => e.nome && e.nome.toLowerCase().includes(q))) return true;
            }
            // Chiavi dosiBase (acqua, farina, olio, ecc.)
            if (r.dosiBase) {
                if (Object.keys(r.dosiBase).some(k => k.toLowerCase().includes(q))) return true;
            }
            return false;
        });

        if (risultati.length === 0) {
            boxRisultati.innerHTML = `<p class="ricerca-nessun-risultato">Nessuna ricetta trovata per "<em>${query}</em>".</p>`;
        } else {
            let html = `<p class="ricerca-sommario">${risultati.length} ricett${risultati.length === 1 ? 'a' : 'e'} trovat${risultati.length === 1 ? 'a' : 'e'}:</p>`;
            risultati.forEach(r => {
                let linkFoto = '';
                if (r.immagine) {
                    linkFoto = ` <span class="vedi-foto-btn" onclick="event.stopPropagation(); apriFotoSovrapposizione('${r.immagine}')">[ VEDI FOTO ]</span>`;
                }
                html += `<div class="cat-item" onclick="mostraDettaglioRicetta('${r.id}')">N.&nbsp;${r.numero} — ${r.titolo}${linkFoto}</div>`;
            });
            boxRisultati.innerHTML = html;
        }
        boxRisultati.style.display = 'block';
    }

              onblur="aggiornaParametroMadre(this.innerText)"

              style="font-family: 'Cinzel', serif; font-weight: bold; font-size: 1.35rem; color: #800020; border-bottom: 1px dashed #800020; padding: 0 4px; cursor: pointer; outline: none; display: inline-block; font-style: normal;">${parametroMadre}</span> 
        <span style="font-family: 'Cinzel', serif; font-weight: bold; font-size: 0.9rem; font-style: normal;">gr.</span>
    </p>
</div

`}
            `;
        }
    
        // --- FINE SEZIONE DINAMICA ---
        html += '</div><!-- fine svela-3 -->';

        html += `
            <a href="#" class="ancora-storia" onclick="saltaAStoria(event)">Leggi il procedimento romanzato</a>

        <div class="svela-4"><div class="box-info-girmi">
                <strong>Impostazioni Girmi:</strong><br>
                Programma: ${ricetta.programma} | Doratura: ${ricetta.doratura}
            </div>

            <h3>I Componenti dell'Alchimia</h3>
            <ol id="lista-ingredienti-dinamica"></ol>
        `;

        // 📜 INSERIMENTO DELLE NOTE SUBITO DOPO GLI INGREDIENTI
        if (ricetta.note && ricetta.note.trim() !== "") {
            html += `
                <div class="box-note-alchimista" style="margin: 20px 0; padding: 15px; background: rgba(140, 98, 57, 0.08); border-left: 4px solid #8c6239; font-style: italic; color: #4a2711;">
                    ${ricetta.note}
                </div>
            `;
        }

        // 📚 A SEGUIRE, IL RACCONTO
        html += `
            </div><!-- fine svela-4 -->
        <div class="svela-5"><div class="racconto-sezione" id="sezione-storia">
                <h3>Il Racconto del Procedimento</h3>
                <div style="color: #4a2711;">${ricetta.storia}</div>
            </div>
        `;
    
        html += '</div><!-- fine svela-5 -->';
        box.innerHTML = html;
    
        // Gestiamo il riempimento della lista ingredienti in base al tipo di ricetta
        if (ricetta.tipoDose === 'fissa' && ricetta.ingredientiFissi) {
            const listaUl = document.getElementById('lista-ingredienti-dinamica');
            let ingHtml = '';
            ricetta.ingredientiFissi.forEach(ing => {
                ingHtml += `<li><strong>${ing.nome}</strong>: ${ing.quantita}</li>`;
            });
            listaUl.innerHTML = ingHtml;
        } else {
            aggiornaDosiSchermo(ricetta);
        }
    }

    function cambiaParametroRicetta(btnEl, idRicetta, tipo, valore) {
        if(tipo === 'peso') pesoAttuale = valore;
        if(tipo === 'lievito') {
            lievitoAttuale = valore;
            
            // --- AGGIUNTA: Mostra o nascondi la finestrella del lievito madre ---
            const boxMadre = document.getElementById('box-parametro-madre');
            if (boxMadre) {
                boxMadre.style.display = (valore === 'madre') ? 'block' : 'none';
            }
            // ------------------------------------------------------------------
        }
            
        const siblings = btnEl.parentElement.querySelectorAll('.selector-btn');
        siblings.forEach(s => s.classList.remove('active'));
        btnEl.classList.add('active');

        const ricetta = databaseRicette.find(r => r.id === idRicetta);
        aggiornaDosiSchermo(ricetta);
    }
    function aggiornaParametroMadre(valore) {

    parametroMadre = parseFloat(valore) || 35;

    localStorage.setItem('parametroMadre', parametroMadre);

    if (ricettaAttuale) {
        aggiornaDosiSchermo(ricettaAttuale);
    }
}

    function arrotondaCucchiaino(valore) {
        let arrotondato = Math.round(valore * 2) / 2;
        return arrotondato % 1 === 0 ? arrotondato.toFixed(0) : arrotondato.toFixed(1);
    }

    function aggiornaDosiSchermo(ricetta) {
        let coeffPeso = 1.0;
        if(pesoAttuale === 500) coeffPeso = 0.66;
        if(pesoAttuale === 1000) coeffPeso = 1.33;

        let coeffLievito = 1.0; 
        let nomeLievito = "Lievito di Birra Secco"; 
        let unitaLievito = ricetta.unitaLievito || "g"; // Supporta unità personalizzate per lo yogurt
    
        if(lievitoAttuale === 'fresco') { 
            coeffLievito = 3.0; 
            nomeLievito = "Lievito di Birra Fresco"; 
        } else if(lievitoAttuale === 'madre') { 
            nomeLievito = "Lievito Madre Secco disidratato"; 
        }

        let htmlIngredienti = "";

        // Gestione dinamica degli ingredienti per ricette ricche (es. Pan Brioche)
        if(ricetta.isBrioche) {
            const farinaFin = ricetta.dosiBase.farina ? (ricetta.dosiBase.farina * coeffPeso).toFixed(0) : 0;
            const saleFin = ricetta.dosiBase.sale ? (ricetta.dosiBase.sale * coeffPeso).toFixed(1) : 0;
            const zuccheroFin = ricetta.dosiBase.zucchero ? (ricetta.dosiBase.zucchero * coeffPeso).toFixed(1) : 0;
           let lievitoFin = 0;

if (ricetta.dosiBase.lievito) {

    if (lievitoAttuale === 'madre') {

        const farinaTotale = ricetta.dosiBase.farina * coeffPeso;

        // Molino Rossetto: 35 g ogni 500 g di farina
        lievitoFin = (farinaTotale * parametroMadre / 500).toFixed(1);

    } else {

        lievitoFin = (ricetta.dosiBase.lievito * coeffPeso * coeffLievito).toFixed(1);

    }
}
            const latteFin = ricetta.dosiBase.latte ? (ricetta.dosiBase.latte * coeffPeso).toFixed(0) : 0;
            const burroFin = ricetta.dosiBase.burro ? (ricetta.dosiBase.burro * coeffPeso).toFixed(0) : 0;
        
            // Le uova non si scalano linearmente: 1 uovo è la dose base (750g).
            // A 500g si omette (troppo piccola la pagnotta) o si usa solo il tuorlo.
            // A 1000g si usano 2 uova. Il campo dosiBase.uova indica la dose per 750g.
            let uovaFin = 0;
            let notaUova = '';
            if (ricetta.dosiBase.uova) {
                const uovaBase = ricetta.dosiBase.uova;
                if (pesoAttuale === 750) {
                    uovaFin = uovaBase;
                } else if (pesoAttuale === 500) {
                    uovaFin = 0;
                    notaUova = `<li class="nota-uova">⚠️ A 500 g ometti l'uovo (o usa solo il tuorlo) — le uova non si dimezzano.</li>`;
                } else if (pesoAttuale === 1000) {
                    uovaFin = uovaBase * 2;
                    notaUova = `<li class="nota-uova">💡 A 1000 g usa ${uovaFin} uova.</li>`;
                }
            }

            let testoLiquidi = `${latteFin} ml di Latte`;
            if (uovaFin > 0) {
                testoLiquidi += ` unito a ${uovaFin} uov${uovaFin === 1 ? 'o' : 'a'} (da sbattere leggermente)`;
            }

            if (latteFin > 0) htmlIngredienti += `<li><strong>I Liquidi:</strong> ${testoLiquidi}</li>`;
            if (notaUova) htmlIngredienti += notaUova;
            if (farinaFin > 0) htmlIngredienti += `<li><strong>Il Mantello:</strong> ${farinaFin} g di ${ricetta.tipoFarina}.</li>`;
            if (parseFloat(saleFin) > 0) htmlIngredienti += `<li><strong>Angolo Opposto 1:</strong> ${saleFin} cucchiaino di Sale.</li>`;
            if (parseFloat(zuccheroFin) > 0) htmlIngredienti += `<li><strong>Angolo Opposto 2:</strong> ${zuccheroFin} cucchiai grandi di Zucchero.</li>`;
            if (burroFin > 0) htmlIngredienti += `<li><strong>Il Tocco Regale (Burro):</strong> ${burroFin} g di Burro morbido (da inserire a piccoli cubetti dopo i primi minuti di impasto).</li>`;
            if (parseFloat(lievitoFin) > 0) htmlIngredienti += `<li><strong>Nel Cratere Centrale:</strong> ${lievitoFin} ${unitaLievito} di ${nomeLievito} <em>(incolume, lontano dal sale!)</em>.</li>`;
        
        } else {
            // Sequenza classica per i pani standard e ricette speciali (come lo Yogurt)
            const testoLiquidoDinamico = ricetta.etichettaLiquido || "Acqua";
            const testoLievitoDinamico = ricetta.etichettaLievito || nomeLievito;

            // 1. LIQUIDI (appare solo se acqua/liquido base è definito e maggiore di 0)
            if (ricetta.dosiBase.acqua && ricetta.dosiBase.acqua > 0) {
                const acquaFin = (ricetta.dosiBase.acqua * coeffPeso).toFixed(0);
                htmlIngredienti += `<li><strong>Liquidi (sempre tiepidi):</strong> ${acquaFin} ml di ${testoLiquidoDinamico}.</li>`;
            }
        
            // 2. FARINE (Il Mantello)
            if (ricetta.dosiBase.farine) {
                for (let tipo in ricetta.dosiBase.farine) {
                    let qta = (ricetta.dosiBase.farine[tipo] * coeffPeso).toFixed(0);
                    if (parseInt(qta) > 0) {
                        htmlIngredienti += `<li><strong>Il Mantello:</strong> ${qta} g di Farina ${tipo}.</li>`;
                    }
                }
            } else if (ricetta.dosiBase.farina && ricetta.dosiBase.farina > 0) {
                const farinaFin = (ricetta.dosiBase.farina * coeffPeso).toFixed(0);
                htmlIngredienti += `<li><strong>Il Mantello:</strong> ${farinaFin} g di ${ricetta.tipoFarina}.</li>`;
            }

            // 3. SALE
            if (ricetta.dosiBase.sale && ricetta.dosiBase.sale > 0) {
                const saleCalcolato = ricetta.dosiBase.sale * coeffPeso;
                const saleFin = arrotondaCucchiaino(saleCalcolato);
                htmlIngredienti += `<li><strong>Angolo Opposto 1:</strong> ${saleFin} cucchiaino/i di Sale.</li>`;
            }

            // 4. ZUCCHERO
            if (ricetta.dosiBase.zucchero && ricetta.dosiBase.zucchero > 0) {
                const zuccheroCalcolato = ricetta.dosiBase.zucchero * coeffPeso;
                const zuccheroFin = arrotondaCucchiaino(zuccheroCalcolato);
                htmlIngredienti += `<li><strong>Angolo Opposto 2:</strong> ${zuccheroFin} cucchiaino/i di Zucchero o Miele.</li>`;
            }

            // 5. LIEVITO O STARTER
if (ricetta.dosiBase.lievito && ricetta.dosiBase.lievito > 0) {

    let lievitoFin;

    if (lievitoAttuale === 'madre') {

        // Calcolo basato sulla quantità reale di farina
        let farinaTotale = 0;

        if (ricetta.dosiBase.farine) {
            for (let tipo in ricetta.dosiBase.farine) {
                farinaTotale += ricetta.dosiBase.farine[tipo];
            }
        } else if (ricetta.dosiBase.farina) {
            farinaTotale = ricetta.dosiBase.farina;
        }

        farinaTotale = farinaTotale * coeffPeso;

        // Molino Rossetto:
        // 35 g ogni 500 g di farina
        lievitoFin = (farinaTotale * parametroMadre / 500).toFixed(1);

    } else {

        let coeffMoltiplicatore = ricetta.etichettaLievito ? 1.0 : coeffLievito;
        lievitoFin = (ricetta.dosiBase.lievito * coeffPeso * coeffMoltiplicatore).toFixed(1);

    }

    htmlIngredienti += `<li><strong>Nel Cratere Centrale:</strong> ${lievitoFin} ${unitaLievito} di ${testoLievitoDinamico} <em>(lontano dal sale!)</em></li>`;
}

            // 6. INGREDIENTI EXTRA AL BIP o INIZIALI
            if (ricetta.ingredientiExtra) {
                ricetta.ingredientiExtra.forEach(ex => {
                    let usaCucchiaino = ex.unita === "cucchiaini" || ex.unita === "cucchiaino";
                    let qtaCalcolata = ex.qtaBase * coeffPeso;
                
                    // Se usa i cucchiaini arrotonda allo 0.5 più vicino, altrimenti lascia l'intero per i grammi (es. 40g, 53g)
                    let qtaEx = usaCucchiaino ? arrotondaCucchiaino(qtaCalcolata) : qtaCalcolata.toFixed(0);
                
                    if (parseFloat(qtaEx) > 0) {
                        let unitaTxt = ex.unita ? ` ${ex.unita}` : " g";
                        let momentoTxt = ex.momento || "Al segnale acustico (BIP)";
                        htmlIngredienti += `<li><strong>${momentoTxt}:</strong> ${qtaEx}${unitaTxt} di ${ex.nome}.</li>`;
                    }
                });
            }
        }

        document.getElementById('lista-ingredienti-dinamica').innerHTML = htmlIngredienti;
    }

    function saltaAStoria(e) { e.preventDefault(); document.getElementById('sezione-storia').scrollIntoView({ behavior: 'smooth' }); }

    /* ============================================================
       APERTURA — LA HOME AFFIORA DALLE NEBBIE
       Nessun testo, nessuno splash. La pergamena emerge
       lentamente dal buio alla massima semplicità.
       ============================================================ */
    (function() {
        const app = document.getElementById('app-container');
        if (app) app.classList.add('home-emersa');
    })();

    function avviaCitazioneHome()       {}
    function fermaAnimazioneCitazione() {}
    </script>
